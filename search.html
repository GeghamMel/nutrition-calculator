    .popular{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;align-items:center;}

    .pop-tag{padding:6px 14px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:50px;font-size:0.82rem;color:white;cursor:pointer;}
    .pop-tag:hover{background:rgba(255,255,255,0.25);}

    .f-btn{padding:7px 16px;border-radius:50px;border:1.5px solid var(--border);background:white;font-size:0.85rem;font-weight:600;cursor:pointer;color:var(--muted);font-family:var(--font-body);}
    .f-btn.active{background:#6366f1;color:white;border-color:#6366f1;}
    .res-count{font-size:0.88rem;color:var(--muted);margin-bottom:16px;}
    .res-card{display:flex;gap:16px;align-items:center;background:white;border-radius:12px;padding:18px 20px;margin-bottom:12px;box-shadow:var(--shadow);border:1.5px solid var(--border);text-decoration:none;color:#1e293b;transition:all 0.2s;}
    .res-card:hover{border-color:#6366f1;transform:translateY(-1px);box-shadow:0 8px 32px rgba(0,0,0,0.12);}
    .res-icon{width:48px;height:48px;border-radius:10px;background:#eef2ff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
    .res-info{flex:1;}
    .res-type{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#6366f1;margin-bottom:4px;}
    .res-title{font-weight:700;font-size:0.95rem;margin-bottom:2px;}
    .res-desc{font-size:0.82rem;color:#64748b;}
    .res-code{background:#f8fafc;border:2px dashed #e2e8f0;border-radius:8px;padding:6px 14px;font-family:monospace;font-size:0.9rem;font-weight:700;flex-shrink:0;color:#1e293b;}
    .no-res{text-align:center;padding:60px 24px;color:#64748b;}
    .no-res .em{font-size:3rem;margin-bottom:12px;}
  </style>

<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-logo"><div class="logo-icon">💰</div> SaveHub</a>
    <nav class="header-nav">
      <a href="vpn.html" data-en="VPN" data-ru="VPN">VPN</a>
      <a href="software.html" data-en="Software" data-ru="Софт">Software</a>
      <a href="courses.html" data-en="Courses" data-ru="Курсы">Courses</a>
      <a href="blog/index.html" data-en="Blog" data-ru="Блог">Blog</a>
    </nav>
    <div class="lang-btns">
      <button class="lang-btn active" id="langEN">EN</button>
      <button class="lang-btn" id="langRU" onclick="window.location.href='ru/search.html'">RU</button>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</header>
<nav class="mobile-nav" id="mobileNav">
  <a href="index.html">🏠 Home</a>
  <a href="vpn.html">🔒 VPN</a>
  <a href="software.html">💻 Software</a>
  <a href="courses.html">🎓 Courses</a>
  <a href="shopping.html">🛒 Shopping</a>
  <a href="gaming.html">🎮 Gaming</a>
  <a href="travel.html">✈️ Travel</a>
</nav>

<div class="search-hero">
  <div class="container">
    <h1 data-en="Search Promo Codes" data-ru="Поиск промокодов">Search Promo Codes</h1>
    <div class="search-box">
      <input type="text" id="q" placeholder="Search NordVPN, Udemy, Amazon..." data-en="Search NordVPN, Udemy, Amazon..." data-ru="Поиск NordVPN, Udemy, Amazon..." />
      <button onclick="doSearch()" data-en="Search" data-ru="Найти">Search</button>
    </div>
    <div class="popular">
      <span class="lbl" data-en="Popular:" data-ru="Популярное:">Popular:</span>
      <span class="pop-tag" onclick="quick('Udemy')">Udemy</span>
    </div>
  </div>
</div>

<main style="padding:40px 0 80px;">
  <div class="container">
    <div class="filters">
      <button class="f-btn active" onclick="setFilter(this,'all')" data-en="All" data-ru="Все">All</button>
      <button class="f-btn" onclick="setFilter(this,'courses')" data-en="🎓 Courses" data-ru="🎓 Курсы">🎓 Courses</button>
    </div>
    <div class="res-count" id="cnt"></div>
    <div id="results"></div>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand"><a href="index.html" class="site-logo"><div class="logo-icon">💰</div> SaveHub</a><p>Best promo codes updated daily.</p></div>
      <div class="footer-col"><h4>Categories</h4><a href="vpn.html">VPN</a><a href="software.html">Software</a><a href="courses.html">Courses</a><a href="shopping.html">Shopping</a></div>
      <div class="footer-col"><h4>Company</h4><a href="about.html">About</a><a href="privacy.html">Privacy</a><a href="contact.html">Contact</a></div>
    </div>
    <div class="footer-bottom">&copy; <span id="yr"></span> SaveHub.blog</div>
  </div>
</footer>
<div id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>
<div id="readProgress"></div>

<script>
var lang = 'en';
var cat = 'all';

var ITEMS = [
  {c:'courses',i:'🎓',n:'Udemy',de:'Courses from $9.99',dr:'Курсы от $9.99',dd:'200,000+ courses on any topic.',ddr:'200 000+ курсов.',code:'',url:'courses.html',t:'udemy courses learning'},
];

var CAT_LABELS = {
  vpn: {en:'VPN', ru:'VPN'},
  software: {en:'Software', ru:'Программы'},
  courses: {en:'Courses', ru:'Курсы'},
  streaming: {en:'Streaming', ru:'Стриминг'},
  shopping: {en:'Shopping', ru:'Покупки'},
  gaming: {en:'Gaming', ru:'Игры'},
  travel: {en:'Travel', ru:'Путешествия'},
  hosting: {en:'Hosting', ru:'Хостинг'}
};

function render() {
  var l = lang;
  var q = document.getElementById('q').value.toLowerCase().trim();
  var box = document.getElementById('results');
  var cnt = document.getElementById('cnt');

  var res = ITEMS.filter(function(item) {
    var mc = cat === 'all' || item.c === cat;
    var mq = !q ||
      item.n.toLowerCase().indexOf(q) !== -1 ||
      item.t.indexOf(q) !== -1 ||
      item.de.toLowerCase().indexOf(q) !== -1 ||
      item.code.toLowerCase().indexOf(q) !== -1;
    return mc && mq;
  });

  if (!q && cat === 'all') {
    cnt.textContent = l === 'ru' ? 'Начните вводить для поиска...' : 'Start typing to search...';
    box.innerHTML = '';
    return;
  }

  cnt.textContent = l === 'ru'
    ? 'Найдено: ' + res.length + ' результатов'
    : res.length + ' results found';

  if (res.length === 0) {
    box.innerHTML = '<div class="no-res"><div class="em">🔍</div><p>' +
      (l === 'ru' ? 'Ничего не найдено. Попробуйте другой запрос.' : 'No results found. Try a different search.') +
      '</p></div>';
    return;
  }

  box.innerHTML = res.map(function(item) {
    var deal = l === 'ru' ? item.dr : item.de;
    var desc = l === 'ru' ? item.ddr : item.dd;
    var catLbl = CAT_LABELS[item.c] ? CAT_LABELS[item.c][l] : item.c;
    return '<a href="' + item.url + '" class="res-card">' +
      '<div class="res-icon">' + item.i + '</div>' +
      '<div class="res-info">' +
        '<div class="res-type">' + catLbl + '</div>' +
        '<div class="res-title">' + item.n + ' — ' + deal + '</div>' +
        '<div class="res-desc">' + desc + '</div>' +
      '</div>' +
      (item.code ? '<div class="res-code">' + item.code + '</div>' : '') +
    '</a>';
  }).join('');
}

function doSearch() { render(); }

function quick(term) {
  document.getElementById('q').value = term;
  render();
}

function setFilter(btn, c) {
  cat = c;
  document.querySelectorAll('.f-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function applyLang(l) {
  document.documentElement.lang = l;
  document.querySelectorAll('[data-en]').forEach(function(el) {
    var t = el.getAttribute('data-' + l);
    if (!t) return;
    if (el.tagName === 'INPUT') { el.placeholder = t; return; }
    el.textContent = t;
  });
}

function setLang(l) {
  lang = l;
  localStorage.setItem('sh_lang', l);
  document.getElementById('langEN').classList.toggle('active', l === 'en');
  document.getElementById('langRU').classList.toggle('active', l === 'ru');
  applyLang(l);
  render();
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('yr').textContent = new Date().getFullYear();
  document.getElementById('hamburger').addEventListener('click', function() {
    document.getElementById('mobileNav').classList.toggle('open');
  });
  window.addEventListener('scroll', function() {
    var s = window.scrollY, d = document.documentElement.scrollHeight - window.innerHeight;
    document.getElementById('readProgress').style.width = (d > 0 ? s/d*100 : 0) + '%';
    document.getElementById('scrollTop').style.display = s > 400 ? 'flex' : 'none';
  });

  // Real-time search as user types
  document.getElementById('q').addEventListener('input', function() { render(); });
  document.getElementById('q').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') render();
  });

  // Check URL params
  var params = new URLSearchParams(window.location.search);
  if (params.get('q')) {
    document.getElementById('q').value = params.get('q');
  }

  render();
});
</script>
</body>
</html>
