    <body>Verification: 2cdd74c8573ea37b<script>
/* Mega menu */
(function(){
  // Hamburger
  var hbtn = document.getElementById('hamburger');
  var nav = document.getElementById('siteNav');
  if(hbtn && nav){
    hbtn.addEventListener('click', function(e){
      e.stopPropagation();
      nav.classList.toggle('open');
    });
  }
  // Mobile mega menu tap
  document.addEventListener('DOMContentLoaded', function(){
    document.querySelectorAll('.nav-item > a').forEach(function(link){
      link.addEventListener('click', function(e){
        if(window.innerWidth >= 769) return;
        var menu = this.closest('.nav-item').querySelector('.mega-menu');
        if(!menu) return;
        e.preventDefault();
        e.stopPropagation();
        var isOpen = menu.classList.contains('open');
        document.querySelectorAll('.mega-menu').forEach(function(m){ m.classList.remove('open'); });
        document.querySelectorAll('.nav-item > a').forEach(function(a){ a.classList.remove('mm-open'); });
        if(!isOpen){ menu.classList.add('open'); this.classList.add('mm-open'); }
      }.bind(link));
    });
    document.addEventListener('click', function(e){
      if(!e.target.closest('#siteNav')){
        if(nav) nav.classList.remove('open');
        document.querySelectorAll('.mega-menu').forEach(function(m){ m.classList.remove('open'); });
        document.querySelectorAll('.nav-item > a').forEach(function(a){ a.classList.remove('mm-open'); });
      }
    });
  });
})();
</script>
</body>
</html>
